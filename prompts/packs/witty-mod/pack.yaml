id: witty-mod
label: Witty Mod
hypothesis: Dry, observant, low-volume co-mod voice that answers directly without self-description, stays quiet by default, and keeps moderation firm without over-escalating.
baselinePack: safer-control
changelog:
  - date: "2026-03-30"
    description: >
      Added justifications to safety rules (inherits few-shot and contract
      changes from safer-control baseline).
    hypothesis: >
      Justifications help the model generalize rules to novel edge cases,
      especially important for the witty voice where tone boundaries are softer.
    result: pending
  - date: "2026-03-31"
    description: >
      Prompt optimization: telegraphic compression, positive reframing,
      mode-split style, trimmed examples (13->8 mod, 6->4 social),
      shorter moderation reason field.
    hypothesis: >
      Reducing token count ~30-40% keeps context under 50% utilization
      where 4B models work best. Positive reframing improves compliance.
      Fewer examples reduce mid-prompt attention dilution.
    result: pending
  - date: "2026-03-31"
    description: >
      IRL safety expansion and output token reduction. Added stream-sniper
      coordination, bystander harassment, personal info fishing to IRL bucket.
      Added reporting-vs-perpetrating false positive guidance. Capped reason
      field at 8 words. Added compact full-output JSON examples for moderation
      and abstain. Moved hard-violation clause to top of contract. Added
      action/abstain schema clarity rule. Added social examples for help and
      rules questions.
    hypothesis: >
      Shorter reason cap prevents JSON truncation on verbose 4B outputs.
      Full-output examples anchor output shape and length. Reporting guidance
      eliminates false positive on users quoting violations. Hard-violation
      prominence fixes missed escalation on "send nudes". IRL expansion
      covers stream-sniper and bystander threats identified in research.
    result: pending
  - date: "2026-03-31"
    description: >
      De-escalation false-positive fix. Added current-message-must-independently-violate
      rule to system, contract, and safety rules. Added apology/de-escalation as
      abstain trigger in moderation buckets. Added de-escalation few-shot example.
    hypothesis: >
      Explicit instruction that history cannot turn a clean message into a violation
      prevents the model from punishing apologies. Three new eval scenarios
      (apology-after-mild-violation, clean-message-after-warning, fake-apology-then-reoffend)
      test the fix and the control case.
    result: pending
  - date: "2026-04-20"
    description: >
      Pattern-escalation fix and dry greeting. Split the blanket independence rule into
      two: apology protection kept, pattern-based sustained-hostility allowed. Updated
      the contract clause in src/ai/prompt.ts to match. Removed the hardcoded greeting
      disclaimer (greetCue in prompt.ts) and rewrote social-persona first-time-chatter
      block to match the dry register. Added sustained-hostility-pattern eval scenario.
    hypothesis: >
      The original "current message must independently violate" rule over-corrected,
      telling the model to ignore history when judging harassment pattern. Splitting
      into two explicit clauses preserves the de-escalation fix while allowing pattern
      escalation. Dry greeting aligns first-time-chatter voice with the rest of the pack.
    result: pending
  - date: "2026-04-20"
    description: >
      Voice sharpening for the social register. Replaced fuzzy "warm, witty (not smug)"
      guidance with concrete anti-patterns in social-persona.md and response-style.md:
      no em dashes, no self-description reflex, no throat-clearing, no hedging, no
      opening "I ". Replaced the three-line compact example block with six voice-tight
      pairs in the dry-observant register. Updated system.md Voice line from
      "warm, witty (not smug)" to "dry, observant, low-volume, Twitch-native".
      First-time-chatter greetings carved out to preserve warmth. Moderation and
      safety-rules files untouched.
    hypothesis: >
      Bucket-blocking anti-patterns (the same style that works for moderation rules)
      shift 4B-model social replies from bot-cliche self-description to dry-observant
      one-liners. Concrete before/after examples anchor the target register for the
      model. Moderation precision should stay at 100% since the moderation prompt
      files are byte-identical; watch for tone bleed in warns as a failure mode.
    result: pending
