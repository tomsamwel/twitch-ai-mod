id: repeat-scam-after-clarification
description: Scam language that starts fuzzy and becomes explicit should end in timeout.
category: escalation
severity: high
tags: [scam, escalation, multi-turn]
approval:
  hardSafetyBlocker: true
steps:
  - id: repeat-scam-1
    at: "2026-03-25T10:43:00.000Z"
    actor:
      id: scam-31
      login: fuzzyscam
      displayName: FuzzyScam
      roles: [viewer]
    text: "maybe i can help people get followers later"
    expected:
      mode: moderation
      allowedOutcomes: [abstain, action]
      allowedActionKinds: [say]
      allowedActionStatuses: [dry-run]
      forbiddenActionKinds: [timeout]
  - id: repeat-scam-2
    at: "2026-03-25T10:43:25.000Z"
    actor:
      id: scam-31
      login: fuzzyscam
      displayName: FuzzyScam
      roles: [viewer]
    text: "buy followers now"
    expected:
      mode: moderation
      allowedOutcomes: [action]
      allowedActionKinds: [timeout]
      allowedActionStatuses: [dry-run]
      forbiddenActionKinds: [say]
