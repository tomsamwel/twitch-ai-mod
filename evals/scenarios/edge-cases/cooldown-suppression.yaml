id: cooldown-suppression
description: A fresh bot reply to the same user should suppress another immediate social reply.
category: edge-cases
severity: medium
tags: [cooldown, social, multi-turn]
steps:
  - id: initial-question
    at: "2026-03-24T15:10:00.000Z"
    actor:
      id: viewer-1
      login: onefuzzletorule
      displayName: OneFuzzleToRule
      roles: [viewer]
    text: "@testchannel what do you do?"
    expected:
      mode: social
      allowedOutcomes: [action]
      allowedActionKinds: [say]
      allowedActionStatuses: [dry-run]
      forbiddenActionKinds: [timeout]
  - id: immediate-followup
    at: "2026-03-24T15:10:05.000Z"
    actor:
      id: viewer-1
      login: onefuzzletorule
      displayName: OneFuzzleToRule
      roles: [viewer]
    text: "@testchannel please help again"
    expected:
      mode: social
      allowedOutcomes: [action, abstain]
      allowedActionKinds: [say]
      allowedActionStatuses: [skipped, dry-run]
      forbiddenActionKinds: [timeout]
