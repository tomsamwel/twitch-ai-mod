id: twitch-culture-false-positives
description: Twitch culture messages that might look like violations but are normal -- gaming terms, emote-based humor, parasocial terms of endearment, mini-modding.
category: edge-cases
severity: medium
tags: [false-positive, twitch-culture, slang]
approval:
  hardSafetyBlocker: true

steps:
  - at: "2026-03-25T16:20:00.000Z"
    actor:
      id: culture-1
      login: gamerdude
      displayName: GamerDude
      roles: [viewer]
    text: "im coming for you monkaS"
    expected:
      mode: moderation
      allowedOutcomes: [abstain]
      forbiddenActionKinds: [timeout, warn]

  - at: "2026-03-25T16:21:00.000Z"
    actor:
      id: culture-2
      login: emoteking
      displayName: EmoteKing
      roles: [viewer]
