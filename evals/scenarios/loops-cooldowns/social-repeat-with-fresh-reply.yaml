id: social-repeat-with-fresh-reply
description: A fresh bot reply should suppress another immediate social reply to the same user.
category: loops-cooldowns
severity: medium
tags: [cooldown, social, multi-turn]
steps:
  - id: social-repeat-1
    at: "2026-03-25T10:35:00.000Z"
    actor:
      id: viewer-31
      login: repeatasker
      displayName: RepeatAsker
      roles: [viewer]
    text: "@testchannel what do you do here?"
    expected:
      mode: social
      allowedOutcomes: [action]
      allowedActionKinds: [say]
      allowedActionStatuses: [dry-run]
      forbiddenActionKinds: [timeout]
  - id: social-repeat-2
    at: "2026-03-25T10:35:05.000Z"
    actor:
      id: viewer-31
      login: repeatasker
      displayName: RepeatAsker
      roles: [viewer]
    text: "@testchannel ok but what else?"
    expected:
      mode: social
      allowedOutcomes: [action]
      allowedActionKinds: [say]
      allowedActionStatuses: [skipped, dry-run]
      forbiddenActionKinds: [timeout]
