id: first-time-low-effort-promo
description: First-time low-effort promo should get a public warn, not a timeout.
category: future-warn-candidates
severity: medium
tags: [promo, warn-ready]
futurePreferredAction: warn
approval:
  hardSafetyBlocker: true
steps:
  - at: "2026-03-25T10:50:00.000Z"
    actor:
      id: warn-21
      login: tinyplug
      displayName: TinyPlug
      roles: [viewer]
    text: "yo my art page is pretty cool btw"
    expected:
      mode: moderation
      allowedOutcomes: [abstain, action]
      allowedActionKinds: [warn]
      requiredActionKinds: [warn]
      allowedActionStatuses: [dry-run]
      forbiddenActionKinds: [timeout]
