app:
  name: twitch-ai-mod
  environment: development

runtime:
  dryRun: false
  logLevel: info
  tokenValidationIntervalMinutes: 60

storage:
  sqlitePath: ./data/twitch-ai-mod.sqlite

promptPacks:
  defaultPack: witty-mod

twitch:
  broadcasterLogin: testchannel
  # IMPORTANT: Use a dedicated bot account in production (must differ from broadcasterLogin).
  # Using the same account is only acceptable for local development/testing.
  botLogin: testbot
  requiredScopes:
    - user:read:chat
    - user:write:chat
    - moderator:manage:banned_users
    - user:read:whispers
    - user:manage:whispers

ai:
  enabled: true
  provider: llama-cpp
  requestDefaults:
    temperature: 0
    maxOutputTokens: 200
    timeoutMs: 45000
  context:
    recentRoomMessages: 5
    recentUserMessages: 8
    recentBotInteractions: 4
    maxPromptChars: 4000
  ollama:
    baseUrl: http://localhost:11434
    model: qwen3:4b-instruct
    numCtx: 2048
    keepAlive: -1
  openai:
    baseUrl: https://api.openai.com/v1
    model: gpt-4o-mini
  llamaCpp:
    baseUrl: http://localhost:8081
    model: qwen3:4b-instruct
    managed: true
  # Bounded queue for AI review requests in live mode.
  # Prevents unbounded concurrent AI calls during high-volume chat.
  queue:
    capacity: 50          # max pending AI reviews before dropping oldest
    concurrency: 1        # parallel AI calls (1 for local llama-server/ollama, 3-5 for openai)
    stalenessMs: 30000    # drop items waiting longer than 30s before processing

admin:
  enabled: true
  port: 3001

actions:
  allowLiveChatMessages: true
  allowLiveModeration: false
