enabled: true
commandPrefix: "!"
trustedControllers:
  - login: testchannel
    role: admin
  - login: testmod
    role: admin
broadcasterAlwaysAllowed: true
allowedPromptPacks:
  - witty-mod
  - safer-control
modelPresets:
  local-default:
    provider: llama-cpp
    baseUrl: http://localhost:8081
    model: qwen3:4b-instruct
  local-ollama:
    provider: ollama
    baseUrl: http://localhost:11434
    model: qwen3:4b-instruct
  local-fast:
    provider: ollama
    baseUrl: http://localhost:11434
    model: qwen2.5:1.5b
  azure-gpt-54-nano:
    provider: azure-foundry
    baseUrl: https://tsamwel-ai-foundry.services.ai.azure.com/api/projects/tsamwel-ai-foundry-default-project/openai/v1/
    model: gpt-5.4-nano
  # Larger models (qwen3:8b, gemma3:12b-it-qat) require more GPU/RAM than a
  # MacBook Air provides. Uncomment if running on a machine with 16GB+ VRAM.
  # local-8b:
  #   provider: ollama
  #   baseUrl: http://localhost:11434
  #   model: qwen3:8b
